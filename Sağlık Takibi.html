function hesaplaBMI(kilo, boy) {

        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#333333" strokeWidth={7} />

          strokeDasharray={`${pct * circ} ${circ}`} strokeLinecap="round"
          transform={`rotate(-90 ${cx} ${cy})`} style={{ transition: "stroke-dasharray 0.5s" }} />
        <text x={cx} y={cy - 4} textAnchor="middle" fill="#ffffff" fontSize={size * 0.16} fontWeight="700">{value}</text>
        <text x={cx} y={cy + size * 0.14} textAnchor="middle" fill="#ffffff" fontSize={size * 0.1}>{unit}</text>
      </svg>
      <span style={{ fontSize: 10, color: "#aaaaaa", textTransform: "uppercase", letterSpacing: 1 }}>{label}</span>
    </div>
  );
}

function BMIGauge({ bmi }) {
  const val = Math.min(Math.max(parseFloat(bmi), 10), 40);
  const pct = ((val - 10) / 30) * 100;
  let renk = "#ff5252", label = "Normal";
  if (val < 18.5) { renk = "#cccccc"; label = "Zayıf"; }
  else if (val < 25) { renk = "#ff5252"; label = "Normal"; }
  else if (val < 30) { renk = "#ff9944"; label = "Fazla Kilolu"; }
  else { renk = "#ff2222"; label = "Obez"; }
  return (
    <div style={{ marginBottom: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
        <span style={{ color: "#aaaaaa", fontSize: 13 }}>BMI</span>
        <span style={{ color: renk, fontWeight: 700, fontSize: 17 }}>{bmi} — {label}</span>
      </div>
      <div style={{ background: "#1a1a1a", borderRadius: 99, height: 10, overflow: "hidden" }}>
        <div style={{ width: `${pct}%`, background: `linear-gradient(90deg,#cccccc,${renk})`, height: "100%", borderRadius: 99, transition: "width 0.6s" }} />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4 }}>
        {["10","18.5","25","30","40"].map(v => <span key={v} style={{ fontSize: 9, color: "#888888" }}>{v}</span>)}
      </div>
    </div>
  );
}

function WaterBottle({ ml, hedef }) {
  const pct = Math.min(ml / hedef, 1);
  const fillH = 110 * pct;
  let renk = pct >= 1 ? "#ff6b6b" : pct > 0.6 ? "#ff7070" : pct > 0.3 ? "#ff9944" : "#ff0000";
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
      <svg width={66} height={138}>
        <rect x={13} y={2} width={8} height={9} rx={2} fill="#ffffff" />
        <rect x={10} y={12} width={46} height={110} rx={10} fill="#0d0d0d" stroke="#333333" strokeWidth={2} />
        <clipPath id="bc2"><rect x={10} y={12} width={46} height={110} rx={10} /></clipPath>
        <rect x={10} y={122 - fillH} width={46} height={fillH} fill={renk} opacity={0.85} clipPath="url(#bc2)" style={{ transition: "all 0.5s" }} />
        <text x={33} y={72} textAnchor="middle" fill="#ffffff" fontSize={11} fontWeight="700">{Math.round(pct * 100)}%</text>
      </svg>
      <div style={{ textAlign: "center" }}>
        <div style={{ fontSize: 16, fontWeight: 700, color: renk }}>{ml >= 1000 ? `${(ml/1000).toFixed(1)}L` : `${ml}ml`}</div>
        <div style={{ fontSize: 10, color: "#ffffff" }}>/ {(hedef/1000).toFixed(1)}L</div>
      </div>
    </div>
  );
}

// ── ANA UYGULAMA ──────────────────────────────────────────────────────────────
function App() {
  const [aktifTab, setAktifTab] = useState(0);

  // Profil
  const [profil, setProfil] = useState(() => {
    try { return JSON.parse(localStorage.getItem("saglik_profil")) || { ad:"", yas:"", cinsiyet:"erkek", boy:"", kilo:"", bel:"", boyun:"", kalca:"" }; }
    catch { return { ad:"", yas:"", cinsiyet:"erkek", boy:"", kilo:"", bel:"", boyun:"", kalca:"" }; }
  });

  // Beslenme
  const [ogunler, setOgunler] = useState([]);
  const [secilenKategori, setSecilenKategori] = useState(Object.keys(YIYECEK_KATEGORILERI)[0]);
  const [secilenYiyecek, setSecilenYiyecek] = useState(TUM_YIYECEKLER[0].ad);
  const [beslenmeArama, setBeslenmeArama] = useState("");
  const [ozelBesinler, setOzelBesinler] = useState(() => { try { return JSON.parse(localStorage.getItem("saglik_ozel")) || []; } catch { return []; } });
  const [ozelForm, setOzelForm] = useState({ ac: false, ad:"", kalori:"", protein:"", karb:"", yag:"" });

  // Antrenman
  const [antrenmanlar, setAntrenmanlar] = useState([]);
  const [secilenEg, setSecilenEg] = useState(EGZERSIZLER[0].ad);
  const [egSure, setEgSure] = useState(30);

  // Uyku
  const [uyku, setUyku] = useState([]);
  const [uykulanis, setUykulanis] = useState("");
  const [uykuBitis, setUykuBitis] = useState("");

  // Su
  const [suMl, setSuMl] = useState(0);
  const [suHedef, setSuHedef] = useState(2500);

  // Adım
  const [adim, setAdim] = useState(0);
  const [adimHedef, setAdimHedef] = useState(10000);
  const [adimAktif, setAdimAktif] = useState(false);
  const [adimIzin, setAdimIzin] = useState("bekliyor");
  const [manuelAdim, setManuelAdim] = useState("");
  const lastAccel = useRef({ x:0,y:0,z:0 });
  const stepBuf = useRef([]);
  const motionHandler = useRef(null);

  // Yağ hedefi
  const [hedefYag, setHedefYag] = useState("");
  const [hedefTarih, setHedefTarih] = useState("");
  const [seciliPlan, setSeciliPlan] = useState(0);

  // Profili kaydet
  useEffect(() => { try { localStorage.setItem("saglik_profil", JSON.stringify(profil)); } catch {} }, [profil]);
  useEffect(() => { try { localStorage.setItem("saglik_ozel", JSON.stringify(ozelBesinler)); } catch {} }, [ozelBesinler]);

  // Cleanup motion
  useEffect(() => () => { if (motionHandler.current) window.removeEventListener("devicemotion", motionHandler.current); }, []);

  // Hesaplamalar
  const bmi = hesaplaBMI(profil.kilo, profil.boy);
  const yagOrani = hesaplaYagOrani(profil);
  const bmrVal = hesaplaBMR(profil);
  const tdee = bmrVal ? Math.round(bmrVal * 1.55) : null;

  const toplamKalori = ogunler.reduce((s,o) => s+o.kalori, 0);
  const toplamProtein = ogunler.reduce((s,o) => s+o.protein, 0);
  const toplamKarb = ogunler.reduce((s,o) => s+o.karb, 0);
  const toplamYag = ogunler.reduce((s,o) => s+o.yag, 0);
  const toplamYakilan = antrenmanlar.reduce((s,a) => s+a.yakilanKalori, 0);
  const toplamUyku = uyku.reduce((s,u) => s+u.sure, 0);

  const bugun = new Date().toLocaleDateString("tr-TR", { weekday:"long", day:"numeric", month:"long" });

  // Arama/Filtre
  const tumYiyecekler = [...TUM_YIYECEKLER, ...ozelBesinler];
  const aramaListesi = beslenmeArama.length > 1
    ? tumYiyecekler.filter(y => y.ad.toLowerCase().includes(beslenmeArama.toLowerCase()))
    : secilenKategori === "⭐ Özel" ? ozelBesinler : YIYECEK_KATEGORILERI[secilenKategori] || [];
  const aktifListe = aramaListesi.length > 0 ? aramaListesi : (secilenKategori === "⭐ Özel" ? [] : YIYECEK_KATEGORILERI[secilenKategori] || []);
  const gosterilen = aktifListe.find(y => y.ad === secilenYiyecek) || aktifListe[0];

  function yiyecekEkle() { if (gosterilen) setOgunler(p => [...p, {...gosterilen, id: Date.now()}]); }

  function antrenmanEkle() {
    const eg = EGZERSIZLER.find(e => e.ad === secilenEg);
    if (eg) setAntrenmanlar(p => [...p, { ad: eg.ad, ikon: eg.ikon, sure: Number(egSure), yakilanKalori: Math.round(eg.kaloriDak * egSure), id: Date.now() }]);
  }

  function uykuEkle() {
    if (!uykulanis || !uykuBitis) return;
    const bas = new Date(`2000-01-01T${uykulanis}`);
    let bit = new Date(`2000-01-01T${uykuBitis}`);
    if (bit <= bas) bit = new Date(`2000-01-02T${uykuBitis}`);
    const sure = parseFloat(((bit - bas) / 3600000).toFixed(1));
    setUyku(p => [...p, { baslangic: uykulanis, bitis: uykuBitis, sure, id: Date.now() }]);
    setUykulanis(""); setUykuBitis("");
  }

  function ozelBesinKaydet() {
    const { ad, kalori } = ozelForm;
    if (!ad.trim() || !kalori || isNaN(kalori)) return;
    const yeni = { ad: ad.trim(), kalori: parseFloat(kalori), protein: parseFloat(ozelForm.protein)||0, karb: parseFloat(ozelForm.karb)||0, yag: parseFloat(ozelForm.yag)||0, ozel: true };
    setOzelBesinler(p => [...p, yeni]);
    setOzelForm({ ac: false, ad:"", kalori:"", protein:"", karb:"", yag:"" });
    setSecilenKategori("⭐ Özel");
    setSecilenYiyecek(yeni.ad);
  }

  // Adım sensörü
  const detectStep = useCallback((a) => {
    const mag = Math.sqrt(a.x*a.x + a.y*a.y + a.z*a.z);
    stepBuf.current.push(mag);
    if (stepBuf.current.length > 10) stepBuf.current.shift();
    const avg = stepBuf.current.reduce((s,v)=>s+v,0) / stepBuf.current.length;
    const last = lastAccel.current;
    const lastMag = Math.sqrt(last.x*last.x + last.y*last.y + last.z*last.z);
    lastAccel.current = a;
    if (mag > avg + 2.5 && lastMag <= avg + 2.5) setAdim(p => p + 1);
  }, []);

  async function sensoreBasla() {
    if (!window.DeviceMotionEvent) { setAdimIzin("desteklenmiyor"); return; }
    if (typeof DeviceMotionEvent.requestPermission === "function") {
      try {
        const p = await DeviceMotionEvent.requestPermission();
        if (p !== "granted") { setAdimIzin("reddedildi"); return; }
      } catch { setAdimIzin("reddedildi"); return; }
    }
    setAdimIzin("verildi"); setAdimAktif(true);
    const h = (e) => { const a = e.accelerationIncludingGravity; if (a) detectStep({ x:a.x||0, y:a.y||0, z:a.z||0 }); };
    motionHandler.current = h;
    window.addEventListener("devicemotion", h);
  }

  function sensoriDurdur() {
    if (motionHandler.current) window.removeEventListener("devicemotion", motionHandler.current);
    setAdimAktif(false);
  }

  // Yağ yakımı hesaplamaları
  const k = parseFloat(profil.kilo) || 0;
  const hedefYagVal = parseFloat(hedefYag) || (profil.cinsiyet === "erkek" ? 15 : 22);
  const yagOr = parseFloat(yagOrani) || 0;
  const mevcutYagKg = k * (yagOr / 100);
  const hedefYagKg = k * (hedefYagVal / 100);
  const yakılacak = Math.max(0, mevcutYagKg - hedefYagKg);
  let gunKalani = 0, gerekliAcik = 0, haftalikHiz = 0;
  if (hedefTarih) {
    const bugunD = new Date(); bugunD.setHours(0,0,0,0);
    const hedefD = new Date(hedefTarih); hedefD.setHours(0,0,0,0);
    gunKalani = Math.max(0, Math.round((hedefD - bugunD) / 86400000));
    if (gunKalani > 0 && yakılacak > 0) {
      gerekliAcik = Math.round((yakılacak * 7700) / gunKalani);
      haftalikHiz = parseFloat((yakılacak / (gunKalani / 7)).toFixed(2));
    }
  }
  const hedefKalori = tdee ? Math.max(tdee - (gerekliAcik || Math.round(tdee * 0.15)), 1200) : 1800;
  const acikRenk = gerekliAcik > 800 ? "#ff2222" : gerekliAcik > 500 ? "#ff9944" : "#ff6b6b";

  const inp = (label, key, type="number", ph="") => (
    <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
      <label style={{ fontSize:11, color:"#ffffff", textTransform:"uppercase", letterSpacing:1 }}>{label}</label>
      <input type={type} value={profil[key]} placeholder={ph} inputMode={type==="number"?"decimal":"text"}
        onChange={e => setProfil(p => ({...p, [key]: e.target.value}))} style={IS} />
    </div>
  );

  const adimMesafe = ((adim * 0.78) / 1000).toFixed(2);
  const adimKcal = Math.round(adim * 0.04 * (k / 70 || 1));
  const adimPct = Math.min((adim / adimHedef) * 100, 100);
  const adimRenk = adimPct >= 100 ? "#ff6b6b" : adimPct >= 60 ? "#ff9944" : "#ff7070";

  return (
    <div style={{ height: "100vh", background: "#000000", fontFamily: "'DM Sans',sans-serif", color: "#ffffff", display: "flex", flexDirection: "column", overflow: "hidden" }}>

      {/* iOS Status Bar Pad */}
      <div className="status-bar-pad" style={{ background: "#000000", flexShrink: 0 }} />

      {/* Header */}
      <div style={{ background: "#000000", padding: "12px 16px 14px", borderBottom: "1px solid #ffffff", flexShrink: 0 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <div style={{ fontSize:10, color:"#ff3333", letterSpacing:2, textTransform:"uppercase" }}>Sağlık Takibi</div>
            <div style={{ fontSize:18, fontWeight:700, fontFamily:"'Bebas Neue',cursive", marginTop:2 }}>
              {profil.ad ? `Merhaba, ${profil.ad}! 👋` : "Hoş Geldin! 👋"}
            </div>
            <div style={{ fontSize:11, color:"#888888" }}>{bugun}</div>
          </div>
          {tdee && <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:9, color:"#ffffff", textTransform:"uppercase", letterSpacing:1 }}>Günlük Hedef</div>
            <div style={{ fontSize:20, fontWeight:700, color:"#ff3333" }}>{hedefKalori}</div>
            <div style={{ fontSize:9, color:"#888888" }}>kcal</div>
          </div>}
        </div>
        {/* Mini stat chips */}
        <div style={{ display:"flex", gap:8, marginTop:10, overflowX:"auto", paddingBottom:2 }}>
          {[
            { label:"Alınan", val:toplamKalori, max:tdee||2000, color:"#ff3333", unit:"kcal" },
            { label:"Yakılan", val:toplamYakilan, max:600, color:"#ff6b6b", unit:"kcal" },
            { label:"Su", val:parseFloat((suMl/1000).toFixed(1)), max:parseFloat((suHedef/1000).toFixed(1)), color:"#ff4444", unit:"L" },
            { label:"Adım", val:adim, max:adimHedef, color:adimRenk, unit:"adım" },
            { label:"Uyku", val:toplamUyku, max:8, color:"#ff8080", unit:"sa" },
          ].map(c => (
            <div key={c.label} style={{ background:"#111111", border:"1px solid #333333", borderRadius:10, padding:"8px 12px", minWidth:76, flexShrink:0 }}>
              <div style={{ fontSize:9, color:"#888888", textTransform:"uppercase", letterSpacing:0.8 }}>{c.label}</div>
              <div style={{ fontSize:13, fontWeight:700, color:c.color, marginTop:1 }}>{c.val} <span style={{ fontSize:9, color:"#ffffff" }}>{c.unit}</span></div>
              <div style={{ background:"#1a1a1a", borderRadius:99, height:2, marginTop:4 }}>
                <div style={{ width:`${Math.min(c.val/c.max*100,100)}%`, background:c.color, height:"100%", borderRadius:99, transition:"width 0.4s" }} />
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Scrollable Content */}
      <div className="content-area fade-in" style={{ flex:1, overflowY:"auto", WebkitOverflowScrolling:"touch", padding:"14px 14px 0" }}>

        {/* ── TAB 0: PROFİL ── */}
        {aktifTab === 0 && (
          <div>
            <Card title="👤 Kişisel Bilgiler">

                    <option value="kadin">Kadın</option>

                      { lbl:"TDEE (Orta Aktif)", val:`${tdee} kcal`, ac:"Gerçek günlük enerji ihtiyacın", renk:"#ff6b6b" },
                      { lbl:"Yağ Yakım Hedefi", val:`${Math.round(tdee*0.85)} kcal`, ac:"Güvenli %15 kalori açığı", renk:"#ff9944" },
                      { lbl:"Minimum Güvenli", val:`${profil.cinsiyet==="erkek"?"1500":"1200"} kcal`, ac:"Bu değerin altına düşme!", renk:"#ff2222" },
                    ].map(({lbl,val,ac,renk},i,arr) => (
                      <div key={lbl} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"11px 14px", borderBottom: i<arr.length-1?"1px solid #333333":"none" }}>
                        <div>
                          <div style={{ fontSize:12, fontWeight:600, color:"#f0f0f0" }}>{lbl}</div>
                          <div style={{ fontSize:11, color:"#888888", marginTop:2 }}>{ac}</div>
                        </div>
                        <div style={{ fontSize:14, fontWeight:700, color:renk, marginLeft:10, whiteSpace:"nowrap" }}>{val}</div>
                      </div>
                    ))}
                  </div>
                )}
              </Card>
            )}
          </div>
        )}

        {/* ── TAB 1: BESLENME ── */}
        {aktifTab === 1 && (
          <div>
            <Card title="🍽️ Öğün Ekle">
              <input type="text" placeholder="🔍 Yiyecek ara..." value={beslenmeArama}
                onChange={e => setBeslenmeArama(e.target.value)} style={{...IS, marginBottom:10}} />
              {beslenmeArama.length <= 1 && (
                <div style={{ display:"flex", gap:6, overflowX:"auto", marginBottom:10, paddingBottom:2 }}>
                  {[...Object.keys(YIYECEK_KATEGORILERI), "⭐ Özel"].map(kat => (
                    <button key={kat} onClick={() => { setSecilenKategori(kat); setSecilenYiyecek((YIYECEK_KATEGORILERI[kat]||ozelBesinler)[0]?.ad||""); }} style={{
                      padding:"6px 12px", borderRadius:20, border:`1px solid ${secilenKategori===kat ? '#ff3333' : '#111111'}`,
                      background: secilenKategori===kat ? '#0d0d0d' : '#000000',
                      color: secilenKategori===kat ? '#ff3333' : '#ffffff',
                      cursor:"pointer", fontSize:11, whiteSpace:"nowrap", fontWeight: secilenKategori===kat?700:400
                    }}>{kat}</button>
                  ))}
                </div>
              )}
              {aktifListe.length > 0 ? (
                <>
                  <select value={secilenYiyecek} onChange={e => setSecilenYiyecek(e.target.value)} style={{...IS, marginBottom:10}} size={Math.min(aktifListe.length,5)}>
                    {aktifListe.map(y => <option key={y.ad} value={y.ad}>{y.ad} — {y.kalori} kcal</option>)}
                  </select>
                  {gosterilen && (
                    <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:6, marginBottom:12 }}>
                      {[["Kal",gosterilen.kalori,"kcal","#ff4040"],["Pro",gosterilen.protein,"g","#ff6b6b"],["Karb",gosterilen.karb,"g","#ff9944"],["Yağ",gosterilen.yag,"g","#ff4466"]].map(([l,v,u,c]) => (
                        <div key={l} style={{ background:"#000000", borderRadius:8, padding:8, textAlign:"center" }}>
                          <div style={{ fontSize:13, fontWeight:700, color:c }}>{v}{u}</div>
                          <div style={{ fontSize:10, color:"#888888" }}>{l}</div>
                        </div>
                      ))}
                    </div>
                  )}
                  <button onClick={yiyecekEkle} style={BS}>+ Öğüne Ekle</button>
                </>
              ) : (
                <div style={{ textAlign:"center", padding:"12px 0", color:"#ff8800", fontSize:13 }}>Henüz özel besin yok. Aşağıdan ekle!</div>
              )}
            </Card>

            {/* Özel besin */}
            <Card title="✏️ Kendi Besinine Ekle">
              <button onClick={() => setOzelForm(f=>({...f, ac:!f.ac}))} style={{...BS, background: ozelForm.ac?"#000000":"linear-gradient(135deg,#8b0000,#ff8800)", border: ozelForm.ac?"1px solid #ff8800":"none", color: ozelForm.ac?"#ff8800":"#fff", marginBottom: ozelForm.ac?12:0}}>
                {ozelForm.ac ? "▲ Kapat" : "➕ Yeni Besin Tanımla"}
              </button>
              {ozelForm.ac && (
                <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                  <div>
                    <label style={{ fontSize:11, color:"#ffffff", textTransform:"uppercase", letterSpacing:1 }}>Besin Adı *</label>
                    <input type="text" value={ozelForm.ad} onChange={e=>setOzelForm(f=>({...f,ad:e.target.value}))} style={{...IS, marginTop:4}} placeholder="örn: Ev Köftesi" />
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                    {[["Kalori (kcal) *","kalori","#ff4040"],["Protein (g)","protein","#ff6b6b"],["Karbonhidrat (g)","karb","#ff9944"],["Yağ (g)","yag","#ff4466"]].map(([lbl,key,renk]) => (
                      <div key={key}>
                        <label style={{ fontSize:11, color:renk, textTransform:"uppercase", letterSpacing:1 }}>{lbl}</label>
                        <input type="number" inputMode="decimal" value={ozelForm[key]} onChange={e=>setOzelForm(f=>({...f,[key]:e.target.value}))} style={{...IS, marginTop:4}} placeholder="0" />

            flex:1, padding:"10px 4px 8px", background:"none", border:"none", cursor:"pointer",
            display:"flex", flexDirection:"column", alignItems:"center", gap:3,
            color: aktifTab===t.id ? "#ffffff" : "#666666",
            borderTop: aktifTab===t.id ? "2px solid #ffffff" : "2px solid transparent",
          }}>
            <span style={{ fontSize:20 }}>{t.ikon}</span>
            <span style={{ fontSize:9, fontWeight: aktifTab===t.id?700:400, letterSpacing:0.5 }}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>

<!-- Service Worker for PWA -->
<script>
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'saglik-v1';
    const ASSETS = ['./', 'https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Bebas+Neue&display=swap'];
    self.addEventListener('install', e => { e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./']).catch(()=>{}))); });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match('./'))));
    });
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
